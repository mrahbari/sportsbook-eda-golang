apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
spec:
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      containers:
      - name: wallet-service
        image: sportsbook-wallet-service:latest
        command: ["/app/wallet-service"]
        envFrom:
        - configMapRef:
            name: sportsbook-config
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: wallet-service
