apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
spec:
  selector:
    matchLabels:
      app: outbox-relay
  template:
    metadata:
      labels:
        app: outbox-relay
    spec:
      containers:
      - name: outbox-relay
        image: sportsbook-outbox-relay:latest
        command: ["/app/outbox-relay"]
        envFrom:
        - configMapRef:
            name: sportsbook-config
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: outbox-relay
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: outbox-relay
